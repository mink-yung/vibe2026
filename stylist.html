<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>AI 퍼스널 스타일리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }

    .header {
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 1rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.4rem;
    }

    label .req { color: #e53e3e; margin-left: 2px; }

    input[type="number"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      color: #111;
      background: #fff;
      -webkit-appearance: none;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #5a67d8;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #e0e0e0;
      background: #fafafa;
      font-size: 0.85rem;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .chip.active {
      border-color: #5a67d8;
      background: #eef0fb;
      color: #5a67d8;
      font-weight: 600;
    }

    .error {
      color: #e53e3e;
      font-size: 0.82rem;
      margin-bottom: 0.8rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.85rem;
      background: #5a67d8;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    button[type="submit"]:disabled {
      background: #a0a8e8;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .result-title {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 1rem;
    }

    .result-text {
      font-size: 0.9rem;
      color: #333;
      line-height: 1.7;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI 퍼스널 스타일리스트</h1>
    <p class="subtitle">나에게 맞는 퍼스널 컬러와 패션을 추천받아보세요</p>
  </div>

  <div class="card">
    <div class="field">
      <label>키 (cm) <span class="req">*</span></label>
      <input type="number" id="height" placeholder="예: 170" min="100" max="250" />
    </div>

    <div class="field">
      <label>몸무게 (kg) <span class="req">*</span></label>
      <input type="number" id="weight" placeholder="예: 60" min="30" max="200" />
    </div>

    <div class="field">
      <label>얼굴형 <span class="req">*</span></label>
      <div class="chips" id="chips">
        <div class="chip" data-value="계란형">계란형</div>
        <div class="chip" data-value="둥근형">둥근형</div>
        <div class="chip" data-value="각진형">각진형</div>
        <div class="chip" data-value="하트형">하트형</div>
        <div class="chip" data-value="긴형">긴형</div>
        <div class="chip" data-value="다이아몬드형">다이아몬드형</div>
      </div>
    </div>

    <p class="error" id="error"></p>

    <button type="submit" id="btn" onclick="handleSubmit()">추천받기</button>
  </div>

  <div class="result-card" id="result-card" style="display:none">
    <p class="result-title">✨ 스타일 추천 결과</p>
    <p class="result-text" id="result-text"></p>
  </div>

  <script>
    const WORKER_URL = "https://week5app.hearang3180.workers.dev";
    let selectedFace = "";

    document.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", () => {
        document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        selectedFace = chip.dataset.value;
      });
    });

    async function handleSubmit() {
      const height = document.getElementById("height").value.trim();
      const weight = document.getElementById("weight").value.trim();
      const errorEl = document.getElementById("error");
      const btn = document.getElementById("btn");
      const resultCard = document.getElementById("result-card");
      const resultText = document.getElementById("result-text");

      if (!height || !weight || !selectedFace) {
        errorEl.textContent = "키, 몸무게, 얼굴형을 모두 입력해주세요.";
        return;
      }

      errorEl.textContent = "";
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      resultCard.style.display = "none";

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ height, weight, faceShape: selectedFace }),
        });
        const data = await res.json();
        if (data.error) {
          errorEl.textContent = data.error;
        } else {
          resultText.textContent = data.result;
          resultCard.style.display = "block";
          resultCard.scrollIntoView({ behavior: "smooth" });
        }
      } catch {
        errorEl.textContent = "네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
      } finally {
        btn.disabled = false;
        btn.textContent = "추천받기";
      }
    }
  </script>
</body>
</html>
