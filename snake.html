<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    color: #eee;
  }
  h1 { font-size: 2rem; margin-bottom: 10px; color: #4ecca3; }
  #score-board {
    display: flex;
    gap: 40px;
    margin-bottom: 12px;
    font-size: 1.1rem;
  }
  #score-board span { color: #4ecca3; font-weight: bold; }
  canvas {
    border: 2px solid #4ecca3;
    border-radius: 4px;
    display: block;
  }
  #message {
    margin-top: 14px;
    font-size: 1rem;
    color: #aaa;
    min-height: 1.4em;
  }
</style>
</head>
<body>
<h1>SNAKE</h1>
<div id="score-board">
  Score: <span id="score">0</span>&nbsp;&nbsp;Best: <span id="best">0</span>
</div>
<canvas id="c" width="400" height="400"></canvas>
<div id="message">Press any arrow key to start</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const msgEl = document.getElementById('message');

const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

const DIR = { UP: [0,-1], DOWN: [0,1], LEFT: [-1,0], RIGHT: [1,0] };
const KEY_MAP = {
  ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT',
  w: 'UP', s: 'DOWN', a: 'LEFT', d: 'RIGHT'
};
const OPPOSITE = { UP: 'DOWN', DOWN: 'UP', LEFT: 'RIGHT', RIGHT: 'LEFT' };

let snake, dir, nextDir, food, score, best = 0, state, interval;

function init() {
  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  dir = 'RIGHT';
  nextDir = 'RIGHT';
  score = 0;
  scoreEl.textContent = score;
  state = 'waiting';
  placeFood();
  draw();
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function step() {
  dir = nextDir;
  const head = snake[0];
  const [dx, dy] = DIR[dir];
  const newHead = { x: head.x + dx, y: head.y + dy };

  if (
    newHead.x < 0 || newHead.x >= COLS ||
    newHead.y < 0 || newHead.y >= ROWS ||
    snake.some(s => s.x === newHead.x && s.y === newHead.y)
  ) {
    gameOver();
    return;
  }

  snake.unshift(newHead);
  if (newHead.x === food.x && newHead.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = '#1f2d50';
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      ctx.fillRect(x * CELL + CELL/2 - 1, y * CELL + CELL/2 - 1, 2, 2);

  // Food
  const fx = food.x * CELL, fy = food.y * CELL;
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.arc(fx + CELL/2, fy + CELL/2, CELL/2 - 2, 0, Math.PI * 2);
  ctx.fill();

  // Snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    ctx.fillStyle = i === 0 ? '#4ecca3' : `hsl(${160 - t * 40}, 70%, ${55 - t * 20}%)`;
    const pad = i === 0 ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad*2, CELL - pad*2, 4);
    ctx.fill();
  });

  // Eyes on head
  const h = snake[0];
  const [ex1, ey1, ex2, ey2] = eyePositions(h);
  ctx.fillStyle = '#16213e';
  ctx.beginPath(); ctx.arc(ex1, ey1, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2, ey2, 2, 0, Math.PI*2); ctx.fill();
}

function eyePositions(h) {
  const cx = h.x * CELL + CELL/2, cy = h.y * CELL + CELL/2;
  if (dir === 'RIGHT') return [cx+4, cy-3, cx+4, cy+3];
  if (dir === 'LEFT')  return [cx-4, cy-3, cx-4, cy+3];
  if (dir === 'UP')    return [cx-3, cy-4, cx+3, cy-4];
  return [cx-3, cy+4, cx+3, cy+4];
}

function gameOver() {
  clearInterval(interval);
  state = 'dead';
  msgEl.textContent = `Game over! Score: ${score} — Press any arrow key to restart`;

  // Flash effect
  let flashes = 0;
  const flash = setInterval(() => {
    ctx.fillStyle = `rgba(255,107,107,${flashes % 2 === 0 ? 0.25 : 0})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (++flashes >= 6) clearInterval(flash);
  }, 80);
}

function startGame() {
  clearInterval(interval);
  msgEl.textContent = '';
  state = 'running';
  interval = setInterval(step, 120);
}

document.addEventListener('keydown', e => {
  const mapped = KEY_MAP[e.key];
  if (!mapped) return;
  e.preventDefault();

  if (state === 'waiting' || state === 'dead') {
    nextDir = mapped;
    init();
    startGame();
    return;
  }
  if (mapped !== OPPOSITE[dir]) nextDir = mapped;
});

init();
</script>
</body>
</html>
