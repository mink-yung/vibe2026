<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 면접 준비 플랫폼</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="interview-record.css" />
  <link rel="stylesheet" href="quick-interview.css" />
  <link rel="stylesheet" href="video-interview.css" />
  <link rel="stylesheet" href="basic-interview.css" />
  <link rel="stylesheet" href="quick-result.css" />
  <link rel="stylesheet" href="normal-result.css" />
  <link rel="stylesheet" href="basic-result.css" />
</head>
<body>

<div class="sidebar">
  <div class="logo-box">
    <svg width="22" height="18" viewBox="0 0 22 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:7px;">
      <rect x="0" y="5" width="3" height="8" rx="1.5" fill="#343a40"/>
      <rect x="4.5" y="1" width="3" height="16" rx="1.5" fill="#343a40"/>
      <rect x="9" y="4" width="3" height="10" rx="1.5" fill="#343a40"/>
      <rect x="13.5" y="0" width="3" height="18" rx="1.5" fill="#343a40"/>
      <rect x="18" y="5" width="3" height="8" rx="1.5" fill="#343a40"/>
    </svg>
    <span style="letter-spacing:0.04em;">INTERVIEW AI</span>
  </div>
  <nav>
    <button type="button" class="nav-item" onclick="location.href='dashboard.html'">
      <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span> 홈
    </button>
    <button type="button" class="nav-item" onclick="location.href='mock-interview.html'">
      <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></span> 모의면접
    </button>
    <button type="button" class="nav-item active" onclick="location.href='interview-analysis.html'">
      <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span> 면접분석
    </button>
    <button type="button" class="nav-item" onclick="location.href='ai-feedback.html'">
      <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span> AI피드백
    </button>
    <button type="button" class="nav-item" onclick="location.href='interview-record.html'">
      <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span> 면접기록
    </button>
  </nav>
  <div class="theme-btns">
    <button class="theme-btn on">☀️</button>
    <button class="theme-btn">🌙</button>
  </div>
</div>

<div class="main">
  <div class="topbar" id="authTopbar"></div>
  <div id="analysisSection" style="" class="content">
    <div style="max-width:900px;margin:0 auto;">

      <!-- 평균 점수 요약 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px;">
        <div class="card" style="display:flex;align-items:center;gap:20px;padding:20px 24px;">
          <div style="width:56px;height:56px;border-radius:50%;background:#e7f5ff;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1971c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          </div>
          <div>
            <div style="font-size:12px;color:#868e96;font-weight:500;margin-bottom:4px;">면접 태도 평균 점수</div>
            <div style="font-size:28px;font-weight:800;color:#212529;line-height:1;"><span id="an-attitude-avg">-</span><span style="font-size:14px;font-weight:400;color:#adb5bd;">/50</span></div>
            <div style="font-size:11px;color:#2f9e44;margin-top:4px;" id="an-attitude-diff"></div>
          </div>
        </div>
        <div class="card" style="display:flex;align-items:center;gap:20px;padding:20px 24px;">
          <div style="width:56px;height:56px;border-radius:50%;background:#e7f5ff;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1971c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          </div>
          <div>
            <div style="font-size:12px;color:#868e96;font-weight:500;margin-bottom:4px;">역량 평균 점수</div>
            <div style="font-size:28px;font-weight:800;color:#212529;line-height:1;"><span id="an-competency-avg">-</span><span style="font-size:14px;font-weight:400;color:#adb5bd;">/50</span></div>
            <div style="font-size:11px;color:#2f9e44;margin-top:4px;" id="an-competency-diff"></div>
          </div>
        </div>
      </div>

      <!-- 면접 태도 분석 -->
      <div class="card" style="margin-bottom:24px;">
        <div class="card-header" style="margin-bottom:16px;">
          <span class="card-title">면접 태도 분석</span>
        </div>
        <div class="modal-top" style="max-width:560px;margin:0 auto;">
          <div class="modal-radar-col">
            <svg id="an-attitude-radar" width="240" height="240" viewBox="0 0 280 280"></svg>
          </div>
          <div class="modal-divider-v"></div>
          <div class="modal-stats-col" style="flex:none;min-width:180px;">
            <div class="modal-date-row"><button class="modal-date-btn" id="an-attitude-date">-</button></div>
            <div class="modal-curr-score-row">
              <span class="modal-curr-label">현재 성적</span>
              <div class="modal-curr-num" id="an-attitude-score">-<span>/50</span></div>
            </div>
            <div class="modal-gauge-metrics">
              <svg width="110" height="110" viewBox="0 0 110 110">
                <circle cx="55" cy="55" r="42" fill="none" stroke="#e9ecef" stroke-width="9"/>
                <circle id="an-attitude-gauge" cx="55" cy="55" r="42" fill="none" stroke="#40c057" stroke-width="9" stroke-dasharray="0 264" stroke-linecap="round" transform="rotate(-90 55 55)"/>
                <text x="55" y="60" text-anchor="middle" font-size="10" font-family="sans-serif" style="fill:#adb5bd">최고 기록</text>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <!-- 역량 분석 -->
      <div class="card">
        <div class="card-header" style="margin-bottom:16px;">
          <span class="card-title">역량 분석</span>
        </div>
        <div class="modal-top" style="max-width:560px;margin:0 auto;">
          <div class="modal-radar-col">
            <svg id="an-competency-radar" width="240" height="240" viewBox="0 0 280 280"></svg>
          </div>
          <div class="modal-divider-v"></div>
          <div class="modal-stats-col" style="flex:none;min-width:180px;">
            <div class="modal-date-row"><button class="modal-date-btn" id="an-competency-date">-</button></div>
            <div class="modal-curr-score-row">
              <span class="modal-curr-label">현재 성적</span>
              <div class="modal-curr-num" id="an-competency-score">-<span>/50</span></div>
            </div>
            <div class="modal-gauge-metrics">
              <svg width="110" height="110" viewBox="0 0 110 110">
                <circle cx="55" cy="55" r="42" fill="none" stroke="#e9ecef" stroke-width="9"/>
                <circle id="an-competency-gauge" cx="55" cy="55" r="42" fill="none" stroke="#40c057" stroke-width="9" stroke-dasharray="0 264" stroke-linecap="round" transform="rotate(-90 55 55)"/>
                <text x="55" y="60" text-anchor="middle" font-size="10" font-family="sans-serif" style="fill:#adb5bd">최고 기록</text>
              </svg>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- 로그인 모달 -->
<div class="modal-overlay" id="loginModal" onclick="closeLoginOutside(event)">
  <div class="modal-box modal-box-auth">
    <div class="modal-header">
      <span class="modal-title">로그인</span>
      <button type="button" class="modal-close-btn" onclick="closeLoginModal()" aria-label="닫기">✕</button>
    </div>
    <div class="modal-body">
      <form class="auth-form" id="loginForm" onsubmit="handleLoginSubmit(event)">
        <div id="login-error" class="auth-alert auth-alert-error" role="alert" hidden></div>
        <label class="auth-label" for="login-email">이메일</label>
        <input type="email" id="login-email" class="auth-input" name="email" autocomplete="email" required placeholder="you@example.com" oninput="clearLoginError()" />
        <label class="auth-label" for="login-password">비밀번호</label>
        <input type="password" id="login-password" class="auth-input" name="password" autocomplete="current-password" required placeholder="비밀번호" oninput="clearLoginError()" />
        <button type="submit" class="btn-primary auth-submit">로그인</button>
      </form>
      <p class="auth-switch">계정이 없으신가요? <a href="signup.html" onclick="closeLoginModal()">회원가입</a></p>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
