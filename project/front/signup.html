<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 · AI 면접 준비 플랫폼</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <button type="button" class="auth-back" onclick="location.href='dashboard.html'">← 대시보드로</button>
      <h1 class="auth-card-title">회원가입</h1>
      <p class="auth-card-desc">면접 연습과 AI 피드백을 위해 계정을 만드세요.</p>
      <form class="auth-form" id="signupForm" onsubmit="handleSignupSubmit(event)">
        <div id="signup-error" class="auth-alert auth-alert-error" role="alert" hidden></div>
        <label class="auth-label" for="signup-name">이름</label>
        <input type="text" id="signup-name" class="auth-input" name="name" autocomplete="name" required placeholder="홍길동" />

        <label class="auth-label" for="signup-email">이메일</label>
        <input type="email" id="signup-email" class="auth-input" name="email" autocomplete="email" required placeholder="you@example.com" />

        <label class="auth-label" for="signup-password">비밀번호</label>
        <input type="password" id="signup-password" class="auth-input" name="password" autocomplete="new-password" required minlength="8" placeholder="8자 이상" />

        <label class="auth-label" for="signup-password2">비밀번호 확인</label>
        <input type="password" id="signup-password2" class="auth-input" name="password2" autocomplete="new-password" required placeholder="비밀번호 재입력" />

        <label class="auth-check">
          <input type="checkbox" id="signup-terms" required />
          <span>서비스 이용약관 및 개인정보 처리방침에 동의합니다.</span>
        </label>

        <button type="submit" class="btn-primary auth-submit">가입하기</button>
      </form>
      <p class="auth-switch">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
    </div>
  </div>

  <div class="modal-overlay" id="signupSuccessModal" role="dialog" aria-labelledby="signupSuccessTitle" hidden>
    <div class="modal-box modal-box-auth" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title" id="signupSuccessTitle">회원가입 안내</span>
      </div>
      <div class="modal-body">
        <p class="auth-modal-message" id="signupSuccessMessage"></p>
        <button type="button" class="btn-primary auth-submit" id="signupSuccessOk">확인</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    var lastSignupEmail = '';

    function getSignupErrorEl() {
      return document.getElementById('signup-error');
    }
    function setSignupError(msg) {
      var el = getSignupErrorEl();
      if (!el) return;
      el.textContent = msg || '가입에 실패했습니다.';
      el.hidden = !msg;
    }
    function clearSignupError() {
      var el = getSignupErrorEl();
      if (!el) return;
      el.textContent = '';
      el.hidden = true;
    }
    function pickSignupErrorMessage(data) {
      return pickApiMessage(data, '가입 요청을 처리할 수 없습니다.');
    }

    function openSignupSuccessModal(email) {
      var modal = document.getElementById('signupSuccessModal');
      var msgEl = document.getElementById('signupSuccessMessage');
      if (!modal || !msgEl) return;
      msgEl.textContent =
        email + ' 로 보낸 메일을 이용해 인증 후 로그인해주세요.';
      modal.hidden = false;
      modal.classList.add('open');
    }

    function closeSignupSuccessModal() {
      var modal = document.getElementById('signupSuccessModal');
      if (modal) {
        modal.classList.remove('open');
        modal.hidden = true;
      }
      location.href = 'login.html';
    }

    document.getElementById('signupSuccessOk').addEventListener('click', closeSignupSuccessModal);
    document.getElementById('signupSuccessModal').addEventListener('click', function (e) {
      if (e.target.id === 'signupSuccessModal') closeSignupSuccessModal();
    });

    async function handleSignupSubmit(e) {
      e.preventDefault();
      clearSignupError();
      var p = document.getElementById('signup-password').value;
      var p2 = document.getElementById('signup-password2').value;
      if (p !== p2) {
        setSignupError('비밀번호가 일치하지 않습니다.');
        return;
      }
      var email = document.getElementById('signup-email').value.trim();
      var password = p;
      var name = document.getElementById('signup-name').value.trim();
      var submitBtn = e.target.querySelector('button[type="submit"]');
      if (submitBtn) submitBtn.disabled = true;
      try {
        var response = await apiPostAuthRegister({
          email: email,
          password: password,
          name: name,
        });
        var data = await response.json().catch(function () { return {}; });
        if (!response.ok) {
          setSignupError(pickSignupErrorMessage(data));
          if (response.status >= 500) {
            alert(pickSignupErrorMessage(data));
          }
          return;
        }
        if (data && data.success === false) {
          setSignupError(pickSignupErrorMessage(data));
          return;
        }
        lastSignupEmail = email;
        document.getElementById('signupForm').reset();
        openSignupSuccessModal(email);
      } catch (err) {
        console.error(err);
        var errMsg = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.';
        setSignupError(errMsg);
        alert(errMsg);
      } finally {
        if (submitBtn) submitBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
