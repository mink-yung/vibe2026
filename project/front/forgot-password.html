<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 찾기 · AI 면접 준비 플랫폼</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="mobile-responsive.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <button type="button" class="auth-back" onclick="location.href='login.html'">← 로그인으로</button>
      <h1 class="auth-card-title">비밀번호 찾기</h1>
      <p class="auth-card-desc">가입한 이메일로 비밀번호 재설정 안내를 보내드립니다.</p>
      <form class="auth-form" id="forgotForm" onsubmit="handleForgotSubmit(event)">
        <div id="forgot-error" class="auth-alert auth-alert-error" role="alert" hidden></div>
        <div id="forgot-success" class="auth-alert auth-alert-success" role="status" hidden></div>
        <label class="auth-label" for="forgot-email">이메일</label>
        <input type="email" id="forgot-email" class="auth-input" name="email" autocomplete="email" required placeholder="you@example.com" />
        <button type="submit" class="btn-primary auth-submit" id="forgot-submit-btn">비밀번호 재설정 메일 보내기</button>
      </form>
      <p class="auth-switch"><a href="login.html">로그인 페이지로 돌아가기</a></p>
    </div>
  </div>
  <script src="api.js"></script>
  <script>
    function setForgotError(msg) {
      var el = document.getElementById('forgot-error');
      if (!el) return;
      el.textContent = msg || '';
      el.hidden = !msg;
    }
    function setForgotSuccess(msg) {
      var el = document.getElementById('forgot-success');
      var form = document.getElementById('forgotForm');
      if (!el) return;
      el.textContent = msg || '';
      el.hidden = !msg;
      if (form) form.hidden = !!msg;
    }
    async function handleForgotSubmit(e) {
      e.preventDefault();
      setForgotError('');
      setForgotSuccess('');
      var email = document.getElementById('forgot-email').value.trim();
      var btn = document.getElementById('forgot-submit-btn');
      if (btn) btn.disabled = true;
      try {
        var res = await apiPostAuthForgotPassword({ email: email });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok && data.success !== true) {
          setForgotError(pickApiMessage(data, '요청에 실패했습니다. 잠시 후 다시 시도해 주세요.'));
          return;
        }
        setForgotSuccess(
          data.message ||
            '입력한 이메일로 비밀번호 재설정 안내를 보냈습니다. 메일함을 확인해주세요.'
        );
      } catch (err) {
        console.error(err);
        setForgotError('서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.');
      } finally {
        if (btn) btn.disabled = false;
      }
    }
  </script>
</body>
</html>
