<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 재설정 · AI 면접 준비 플랫폼</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="mobile-responsive.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-card-title">비밀번호 재설정</h1>
      <p class="auth-card-desc" id="reset-desc">새 비밀번호를 입력해 주세요.</p>
      <form class="auth-form" id="resetForm" onsubmit="handleResetSubmit(event)">
        <div id="reset-error" class="auth-alert auth-alert-error" role="alert" hidden></div>
        <div id="reset-success" class="auth-alert auth-alert-success" role="status" hidden></div>
        <label class="auth-label" for="reset-password">새 비밀번호</label>
        <input type="password" id="reset-password" class="auth-input" name="password" autocomplete="new-password" required minlength="4" placeholder="4자 이상" />
        <label class="auth-label" for="reset-password2">새 비밀번호 확인</label>
        <input type="password" id="reset-password2" class="auth-input" name="password2" autocomplete="new-password" required minlength="4" placeholder="비밀번호 재입력" />
        <button type="submit" class="btn-primary auth-submit" id="reset-submit-btn">비밀번호 변경</button>
      </form>
      <p class="auth-switch"><a href="login.html">로그인 페이지로</a></p>
    </div>
  </div>
  <script src="api.js"></script>
  <script>
    function getResetToken() {
      return new URLSearchParams(window.location.search).get('token') || '';
    }

    function setResetError(msg) {
      var el = document.getElementById('reset-error');
      if (!el) return;
      el.textContent = msg || '';
      el.hidden = !msg;
    }

    function setResetSuccess(msg) {
      var el = document.getElementById('reset-success');
      var form = document.getElementById('resetForm');
      if (!el) return;
      el.textContent = msg || '';
      el.hidden = !msg;
      if (form) form.hidden = !!msg;
    }

    (function initResetPage() {
      var token = getResetToken();
      if (!token) {
        setResetError('비밀번호 재설정 링크가 올바르지 않습니다. 메일의 링크를 다시 확인해 주세요.');
        var form = document.getElementById('resetForm');
        if (form) form.hidden = true;
        var desc = document.getElementById('reset-desc');
        if (desc) desc.textContent = '유효하지 않은 링크입니다.';
      }
    })();

    async function handleResetSubmit(e) {
      e.preventDefault();
      setResetError('');
      var token = getResetToken();
      if (!token) {
        setResetError('비밀번호 재설정 링크가 올바르지 않습니다.');
        return;
      }
      var p = document.getElementById('reset-password').value;
      var p2 = document.getElementById('reset-password2').value;
      if (p.length < 4) {
        setResetError('비밀번호는 4자 이상 입력해주세요.');
        return;
      }
      if (p !== p2) {
        setResetError('비밀번호가 일치하지 않습니다.');
        return;
      }
      var btn = document.getElementById('reset-submit-btn');
      if (btn) btn.disabled = true;
      try {
        var res = await apiPostAuthResetPassword({ token: token, password: p });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          setResetError(
            pickApiMessage(data, '비밀번호 재설정 링크가 만료되었거나 올바르지 않습니다.')
          );
          return;
        }
        setResetSuccess(
          data.message || '비밀번호가 변경되었습니다. 새 비밀번호로 로그인해주세요.'
        );
        setTimeout(function () {
          location.href = 'login.html';
        }, 2000);
      } catch (err) {
        console.error(err);
        setResetError('서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.');
      } finally {
        if (btn) btn.disabled = false;
      }
    }
  </script>
</body>
</html>
