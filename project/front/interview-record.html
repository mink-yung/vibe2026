<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 면접 준비 플랫폼</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="interview-record.css" />
  <link rel="stylesheet" href="quick-interview.css" />
  <link rel="stylesheet" href="video-interview.css" />
  <link rel="stylesheet" href="basic-interview.css" />
  <link rel="stylesheet" href="quick-result.css" />
  <link rel="stylesheet" href="normal-result.css" />
  <link rel="stylesheet" href="basic-result.css" />
</head>
<body>

<div class="sidebar">
  <div class="logo-box">
    <svg width="22" height="18" viewBox="0 0 22 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:7px;">
      <rect x="0" y="5" width="3" height="8" rx="1.5" fill="#343a40"/>
      <rect x="4.5" y="1" width="3" height="16" rx="1.5" fill="#343a40"/>
      <rect x="9" y="4" width="3" height="10" rx="1.5" fill="#343a40"/>
      <rect x="13.5" y="0" width="3" height="18" rx="1.5" fill="#343a40"/>
      <rect x="18" y="5" width="3" height="8" rx="1.5" fill="#343a40"/>
    </svg>
    <span style="letter-spacing:0.04em;">INTERVIEW AI</span>
  </div>
  <nav>
    <button type="button" class="nav-item" onclick="location.href='dashboard.html'">
      <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span> 홈
    </button>
    <button type="button" class="nav-item" onclick="location.href='mock-interview.html'">
      <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></span> 모의면접
    </button>
    <button type="button" class="nav-item" onclick="location.href='interview-analysis.html'">
      <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span> 면접분석
    </button>
    <button type="button" class="nav-item" onclick="location.href='ai-feedback.html'">
      <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span> AI피드백
    </button>
    <button type="button" class="nav-item active" onclick="location.href='interview-record.html'">
      <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span> 면접기록
    </button>
  </nav>
  <div class="theme-btns">
    <button class="theme-btn on">☀️</button>
    <button class="theme-btn">🌙</button>
  </div>
</div>

<div class="main">
  <div class="topbar" id="authTopbar"></div>
  <div id="irSection" style="">
    <div class="ir-page">

      <div id="ir-toast" class="ir-toast" hidden role="status"></div>
      <div class="ir-header">
        <div class="ir-title">면접기록</div>
        <div class="ir-subtitle">지금까지 진행한 모든 면접 기록을 한눈에 확인해보세요.</div>
      </div>

      <div class="ir-section-label">전체 요약</div>
      <div class="ir-stats-row">
        <div class="ir-stat-card">
          <div class="ir-stat-label">총 면접 횟수</div>
          <div class="ir-stat-value"><span id="ir-total">-</span><span>회</span></div>
        </div>
        <div class="ir-stat-card">
          <div class="ir-stat-label">평균 점수</div>
          <div class="ir-stat-value"><span id="ir-avg">-</span><span>점</span></div>
          <div class="ir-stat-sub">100점 만점 기준</div>
        </div>
        <div class="ir-stat-card">
          <div class="ir-stat-label">최고 점수</div>
          <div class="ir-stat-value"><span id="ir-best">-</span><span>점</span></div>
          <div class="ir-stat-sub" id="ir-best-sub"></div>
        </div>
        <div class="ir-stat-card">
          <div class="ir-stat-label">총 면접 시간</div>
          <div class="ir-stat-value ir-stat-sm" id="ir-total-time">-</div>
          <div class="ir-stat-sub">모든 면접 누적 시간</div>
        </div>
        <div class="ir-stat-card">
          <div class="ir-stat-label">이번 주 참여</div>
          <div class="ir-stat-value"><span id="ir-weekly">-</span><span>회</span></div>
          <div class="ir-stat-sub">주간 참여 현황</div>
        </div>
      </div>

      <div class="ir-type-row">
        <div class="ir-type-card">
          <div class="ir-type-name">빠른면접</div>
          <svg width="110" height="110" viewBox="0 0 110 110">
            <circle cx="55" cy="55" r="44" fill="none" stroke="#e9ecef" stroke-width="9"/>
            <circle id="ir-quick-circle" cx="55" cy="55" r="44" fill="none" stroke="#74c0fc" stroke-width="9"
              stroke-dasharray="0.1 276.4" stroke-linecap="round" transform="rotate(-90 55 55)"/>
            <text id="ir-quick-score" x="55" y="50" text-anchor="middle" font-size="22" font-weight="800" font-family="sans-serif" style="fill:#212529">-</text>
            <text x="55" y="66" text-anchor="middle" font-size="10" font-family="sans-serif" style="fill:#adb5bd">/ 100</text>
          </svg>
          <div class="ir-type-label">평균 점수</div>
        </div>
        <div class="ir-type-card">
          <div class="ir-type-name">기본면접</div>
          <svg width="110" height="110" viewBox="0 0 110 110">
            <circle cx="55" cy="55" r="44" fill="none" stroke="#e9ecef" stroke-width="9"/>
            <circle id="ir-basic-circle" cx="55" cy="55" r="44" fill="none" stroke="#20c997" stroke-width="9"
              stroke-dasharray="0.1 276.4" stroke-linecap="round" transform="rotate(-90 55 55)"/>
            <text id="ir-basic-score" x="55" y="50" text-anchor="middle" font-size="22" font-weight="800" font-family="sans-serif" style="fill:#212529">-</text>
            <text x="55" y="66" text-anchor="middle" font-size="10" font-family="sans-serif" style="fill:#adb5bd">/ 100</text>
          </svg>
          <div class="ir-type-label">평균 점수</div>
        </div>
        <div class="ir-type-card">
          <div class="ir-type-name">심층면접</div>
          <svg width="110" height="110" viewBox="0 0 110 110">
            <circle cx="55" cy="55" r="44" fill="none" stroke="#e9ecef" stroke-width="9"/>
            <circle id="ir-deep-circle" cx="55" cy="55" r="44" fill="none" stroke="#845ef7" stroke-width="9"
              stroke-dasharray="0.1 276.4" stroke-linecap="round" transform="rotate(-90 55 55)"/>
            <text id="ir-deep-score" x="55" y="50" text-anchor="middle" font-size="22" font-weight="800" font-family="sans-serif" style="fill:#212529">-</text>
            <text x="55" y="66" text-anchor="middle" font-size="10" font-family="sans-serif" style="fill:#adb5bd">/ 100</text>
          </svg>
          <div class="ir-type-label">평균 점수</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">면접 기록 목록</span>
        </div>
        <table class="ir-table">
          <thead>
            <tr>
              <th>날짜</th>
              <th>유형</th>
              <th>카테고리</th>
              <th>소요 시간</th>
              <th>점수</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="irTableBody"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<!-- 면접 상세 모달 -->
<div class="modal-overlay" id="irDetailModal" onclick="irDetailModalOutside(event)">
  <div class="modal-box ir-detail-modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">면접 기록 상세</span>
      <button type="button" class="modal-close-btn" onclick="closeIrDetailModal()" aria-label="닫기">✕</button>
    </div>
    <div class="modal-body" id="ir-detail-body">
      <p class="ir-detail-loading">불러오는 중…</p>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="irDeleteModal" onclick="irDeleteModalOutside(event)">
  <div class="modal-box modal-box-auth" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">면접 기록 삭제</span>
      <button type="button" class="modal-close-btn" onclick="closeIrDeleteModal()" aria-label="닫기">✕</button>
    </div>
    <div class="modal-body">
      <p class="ir-delete-msg">이 면접 기록을 삭제하시겠습니까? 삭제된 기록은 복구할 수 없습니다.</p>
      <div class="ir-delete-actions">
        <button type="button" class="btn-secondary" onclick="closeIrDeleteModal()">취소</button>
        <button type="button" class="btn-primary ir-delete-confirm" onclick="confirmIrDelete()">삭제</button>
      </div>
    </div>
  </div>
</div>

<!-- 로그인 모달 -->
<div class="modal-overlay" id="loginModal" onclick="closeLoginOutside(event)">
  <div class="modal-box modal-box-auth">
    <div class="modal-header">
      <span class="modal-title">로그인</span>
      <button type="button" class="modal-close-btn" onclick="closeLoginModal()" aria-label="닫기">✕</button>
    </div>
    <div class="modal-body">
      <form class="auth-form" id="loginForm" onsubmit="handleLoginSubmit(event)">
        <div id="login-error" class="auth-alert auth-alert-error" role="alert" hidden></div>
        <label class="auth-label" for="login-email">이메일</label>
        <input type="email" id="login-email" class="auth-input" name="email" autocomplete="email" required placeholder="you@example.com" oninput="clearLoginError()" />
        <label class="auth-label" for="login-password">비밀번호</label>
        <input type="password" id="login-password" class="auth-input" name="password" autocomplete="current-password" required placeholder="비밀번호" oninput="clearLoginError()" />
        <button type="submit" class="btn-primary auth-submit">로그인</button>
      </form>
      <p class="auth-switch">계정이 없으신가요? <a href="signup.html" onclick="closeLoginModal()">회원가입</a></p>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="dashboard.js"></script>
<script src="interview-record.js"></script>
</body>
</html>
